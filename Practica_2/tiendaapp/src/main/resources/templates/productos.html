<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos | TiendaApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <!-- Encabezado -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">Productos</h1>
            <p class="text-muted" th:if="${filtro}" th:text="${filtro}">filtro</p>
            <p class="text-muted" th:unless="${filtro}">
                Total:
                <span class="badge bg-primary" th:text="${productos.size()}">0</span>
            </p>
        </div>
        <div class="d-flex gap-2">
            <a href="/productos" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-clockwise me-1"></i>Ver todos
            </a>
            <a href="/productos/nuevo" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-lg me-1"></i>Nuevo producto
            </a>
        </div>
    </div>

    <!-- Flash de éxito -->
    <div class="alert alert-success alert-dismissible fade show" th:if="${ok}">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${ok}">Operación realizada</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Sin resultados -->
    <div class="alert alert-warning" th:if="${productos.isEmpty()}">
        <i class="bi bi-exclamation-triangle me-2"></i>
        No hay productos para mostrar.
    </div>

    <!-- Grid responsive de productos -->
    <div class="row g-3">
        <div class="col-12 col-md-6 col-lg-4"
             th:each="p, iter : ${productos}">

            <div class="card h-100 shadow-sm card-hover">
                <div class="card-body d-flex flex-column">

                    <!-- Badge categoría -->
                    <span class="badge bg-info mb-2" th:text="${p.categoria}">categoria</span>

                    <!-- Badges de stock -->
                    <span th:if="${p.bajoStock}"
                          class="badge bg-warning text-dark mb-2">
                        Pocas unidades
                    </span>
                    <span th:if="${p.agotado}"
                          class="badge bg-danger mb-2">
                        Agotado
                    </span>

                    <!-- Nombre -->
                    <h5 class="card-title brand-accent" th:text="${p.nombre}">Nombre</h5>

                    <!-- Descripción -->
                    <p class="text-muted small flex-grow-1" th:text="${p.descripcion}">descripcion</p>

                    <!-- Precio y stock -->
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="h5 mb-0">
                            $<span th:text="${#numbers.formatDecimal(p.precio, 1, 2)}">0.00</span>
                        </span>
                        <small class="text-muted">
                            <i class="bi bi-box"></i>
                            <span th:text="${p.stock}">0</span> unidades
                        </small>
                    </div>

                    <!-- Botones -->
                    <div class="d-flex gap-2 mt-3">
                        <a class="btn btn-outline-primary btn-sm flex-fill"
                           th:href="@{/productos/{id}(id=${p.id})}">
                            <i class="bi bi-eye me-1"></i>Ver
                        </a>
                        <a class="btn btn-outline-warning btn-sm flex-fill"
                           th:href="@{/productos/{id}/editar(id=${p.id})}">
                            <i class="bi bi-pencil me-1"></i>Editar
                        </a>
                        <button type="button"
                                class="btn btn-outline-danger btn-sm flex-fill"
                                data-bs-toggle="modal"
                                data-bs-target="#modalEliminar"
                                th:data-id="${p.id}"
                                th:data-nombre="${p.nombre}">
                            <i class="bi bi-trash me-1"></i>Eliminar
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

</main>

<!-- Modal de confirmación de eliminación -->
<div class="modal fade" id="modalEliminar" tabindex="-1" aria-labelledby="modalEliminarLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalEliminarLabel">
                    <i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirmar eliminación
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                ¿Estás seguro que querés eliminar el producto
                <strong id="modalNombreProducto"></strong>?
                Esta acción no se puede deshacer.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="bi bi-x-lg me-1"></i>Cancelar
                </button>
                <form id="formEliminar" method="post">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i>Eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/header :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script del modal -->
<script>
    const modalEliminar = document.getElementById('modalEliminar');
    modalEliminar.addEventListener('show.bs.modal', function (event) {
        const boton = event.relatedTarget;
        const id = boton.getAttribute('data-id');
        const nombre = boton.getAttribute('data-nombre');
        document.getElementById('modalNombreProducto').textContent = nombre;
        document.getElementById('formEliminar').action = '/productos/' + id + '/eliminar';
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${curso != null} ? 'Curso: ' + ${curso.nombre} : 'Curso no encontrado'">Curso</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a href="/?nombre=Estudiante">Inicio</a>
            </li>
            <li class="breadcrumb-item">
                <a href="/cursos">Cursos</a>
            </li>
            <li class="breadcrumb-item active"
                th:text="${curso != null} ? ${curso.nombre} : 'No encontrado'">
                Curso
            </li>
        </ol>
    </nav>

    <!-- Caso: curso encontrado -->
    <div th:if="${curso != null}" class="card border-primary shadow">
        <div class="card-header brand-bg">
            <h2 class="mb-0" th:text="${curso.nombre}">Nombre del curso</h2>
        </div>
        <div class="card-body">
            <p class="lead" th:text="${curso.descripcion}">
                Descripcion del curso.
            </p>

            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="border rounded p-3 text-center">
                        <i class="bi bi-mortarboard brand-accent" style="font-size:1.5rem;"></i>
                        <div class="small text-muted mt-2">Creditos</div>
                        <div class="h4 mb-0" th:text="${curso.creditos}">0</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="border rounded p-3 text-center">
                        <i class="bi bi-person-circle brand-accent" style="font-size:1.5rem;"></i>
                        <div class="small text-muted mt-2">Profesor</div>
                        <div class="h6 mb-0" th:text="${curso.profesor}">Profesor</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="border rounded p-3 text-center">
                        <i class="bi bi-hash brand-accent" style="font-size:1.5rem;"></i>
                        <div class="small text-muted mt-2">ID</div>
                        <div class="h4 mb-0" th:text="${curso.id}">0</div>
                    </div>
                </div>
            </div>

            <div class="alert alert-info mt-4">
                <i class="bi bi-info-circle me-1"></i>
                Este detalle se renderiza desde el Controller con
                <code>@PathVariable</code>.
            </div>

            <a class="btn btn-secondary" href="/cursos">
                <i class="bi bi-arrow-left me-1"></i>
                Volver
            </a>
        </div>
    </div>

    <!-- Caso: curso NO encontrado -->
    <div th:if="${curso == null}" class="alert alert-warning">
        <h4 class="alert-heading">
            <i class="bi bi-exclamation-triangle me-2"></i>
            Curso no encontrado
        </h4>
        <p>No existe un curso con ese ID.</p>
        <hr>
        <a class="btn btn-warning" href="/cursos">Volver a la lista</a>
    </div>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

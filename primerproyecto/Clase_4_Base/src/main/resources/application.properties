spring.application.name=clase4base
server.port=8080

# Recargar plantillas Thymeleaf sin reiniciar (dev)
spring.thymeleaf.cache=false

# Nivel de logs - INFO en clase, DEBUG si hay que ver mas detalle
logging.level.root=INFO

#==============================================================
#CLASE 4: descomentar estas propiedades cuando agreguen JPA
#==============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/cursoswebdb
spring.datasource.username=root
spring.datasource.password=Hojancha2004.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate crea / actualiza las tablas a partir de las @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Ver el SQL generado en la consola (util en clase)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
